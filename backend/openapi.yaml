openapi: 3.0.3
info:
  title: Dopamind API
  description: |
    REST API for the Dopamind productivity application.

    **Rate Limits**
    - Auth endpoints (`/api/auth/login`, `/api/auth/register`, `/api/setup/complete`): 20 requests per 15 minutes
    - All other endpoints: 300 requests per 15 minutes

    **Authentication**
    Protected endpoints require a JWT Bearer token obtained via `/api/auth/login` or `/api/auth/register`.
    Pass the token in the `Authorization` header: `Authorization: Bearer <token>`

    **Special Headers**
    - `X-Mail-Config`: Base64-encoded JSON containing IMAP/SMTP configuration (required for mail routes)
    - `X-CalDAV-Config`: Base64-encoded JSON containing CalDAV configuration (required for calendar routes)
  version: 0.1.0
  contact:
    name: Dopamind

servers:
  - url: http://localhost:4000
    description: Local development server (default port 4000; override with PORT env var)

tags:
  - name: Health
    description: Server health check
  - name: Setup
    description: Initial application setup
  - name: Auth
    description: Authentication and user profile
  - name: Tasks
    description: Task and subtask management
  - name: Categories
    description: Category management
  - name: Stats
    description: User statistics and gamification data
  - name: Achievements
    description: Achievement unlocks
  - name: FocusBlocks
    description: Focus session logging
  - name: UserData
    description: Per-user JSON blob storage (settings, app state, etc.)
  - name: Calendar
    description: CalDAV calendar integration
  - name: Mail
    description: IMAP/SMTP mail integration
  - name: Admin
    description: Admin-only user and settings management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Something went wrong

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Success

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true
        lastLogin:
          type: string
          format: date-time
          nullable: true

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: JWT Bearer token
        user:
          $ref: '#/components/schemas/User'

    Subtask:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        text:
          type: string
        completed:
          type: boolean
        estimatedMinutes:
          type: integer
          minimum: 0
          nullable: true
        sortOrder:
          type: integer
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true

    Task:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        scheduledTime:
          type: string
          nullable: true
          description: ISO datetime or time string for scheduled execution
        estimatedMinutes:
          type: integer
          minimum: 0
        energyCost:
          type: string
          enum: [low, medium, high]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        subtasks:
          type: array
          items:
            $ref: '#/components/schemas/Subtask'
        # Metadata fields spread into response
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, exact]
          nullable: true
        scheduledDate:
          type: string
          format: date
          nullable: true
        category:
          type: string
          nullable: true
          description: Category ID
        mailRef:
          type: string
          nullable: true
          description: Reference to a mail UID
        tags:
          type: array
          items:
            type: string
          nullable: true
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true
        blockSortIndex:
          type: integer
          nullable: true

    TaskCreateBody:
      type: object
      required:
        - text
      properties:
        id:
          type: string
          description: Optional client-generated ID for frontend/backend consistency
        text:
          type: string
          minLength: 1
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        energyCost:
          type: string
          enum: [low, medium, high]
          default: medium
        estimatedMinutes:
          type: integer
          minimum: 0
          default: 0
        completed:
          type: boolean
          default: false
        deadline:
          type: string
          format: date-time
          nullable: true
        scheduledTime:
          type: string
          nullable: true
        sortOrder:
          type: integer
          default: 0
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, exact]
          nullable: true
        scheduledDate:
          type: string
          format: date
          nullable: true
        category:
          type: string
          nullable: true
        mailRef:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true
        blockSortIndex:
          type: integer
          nullable: true

    TaskUpdateBody:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        priority:
          type: string
          enum: [low, medium, high]
        energyCost:
          type: string
          enum: [low, medium, high]
        estimatedMinutes:
          type: integer
          minimum: 0
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        scheduledTime:
          type: string
          nullable: true
        sortOrder:
          type: integer
        updatedAt:
          type: string
          format: date-time
          description: Optimistic locking — only update if DB value matches
          nullable: true
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, exact]
          nullable: true
        scheduledDate:
          type: string
          format: date
          nullable: true
        category:
          type: string
          nullable: true
        mailRef:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true
        blockSortIndex:
          type: integer
          nullable: true

    SubtaskCreateBody:
      type: object
      required:
        - text
      properties:
        id:
          type: string
          description: Optional client-generated ID
        text:
          type: string
          minLength: 1
        estimatedMinutes:
          type: integer
          minimum: 0
          default: 0
        sortOrder:
          type: integer
          default: 0
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true

    SubtaskUpdateBody:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        completed:
          type: boolean
        estimatedMinutes:
          type: integer
          minimum: 0
        sortOrder:
          type: integer
        sizeCategory:
          type: string
          enum: [quick, short, medium, long]
          nullable: true

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          default: area
        color:
          type: string
          description: Color palette key (e.g. blue, purple, gray)
          default: gray
        sortOrder:
          type: integer

    CategoryCreateBody:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          description: Optional client-generated ID (upserts on conflict)
        name:
          type: string
          minLength: 1
        type:
          type: string
          default: area
        color:
          type: string
          default: gray
        sortOrder:
          type: integer
          default: 0

    CategoryUpdateBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
        color:
          type: string
        sortOrder:
          type: integer

    Stats:
      type: object
      properties:
        xp:
          type: integer
          minimum: 0
        level:
          type: integer
          minimum: 1
        currentStreakDays:
          type: integer
          minimum: 0
        longestStreak:
          type: integer
          minimum: 0
        completedToday:
          type: integer
          minimum: 0
        completedThisWeek:
          type: integer
          minimum: 0
        completedThisMonth:
          type: integer
          minimum: 0
        completedThisYear:
          type: integer
          minimum: 0
        lastCompletedDate:
          type: string
          format: date
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    StatsUpdateBody:
      type: object
      properties:
        xp:
          type: integer
          minimum: 0
        level:
          type: integer
          minimum: 0
        currentStreakDays:
          type: integer
          minimum: 0
        longestStreak:
          type: integer
          minimum: 0
        completedToday:
          type: integer
          minimum: 0
        completedThisWeek:
          type: integer
          minimum: 0
        completedThisMonth:
          type: integer
          minimum: 0
        completedThisYear:
          type: integer
          minimum: 0
        lastCompletedDate:
          type: string
          format: date
          nullable: true
        updatedAt:
          type: string
          format: date-time
          description: Optimistic locking — only update if DB value matches
          nullable: true

    Achievement:
      type: object
      properties:
        id:
          type: string
        unlockedAt:
          type: string
          format: date-time

    FocusBlock:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        startTime:
          type: string
          nullable: true
          description: HH:MM time string
        durationMinutes:
          type: integer
          minimum: 1
        type:
          type: string
          default: focus
        createdAt:
          type: string
          format: date-time

    FocusBlockCreateBody:
      type: object
      required:
        - date
        - durationMinutes
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
        startTime:
          type: string
          nullable: true
          description: HH:MM time string
        durationMinutes:
          type: integer
          minimum: 1
        type:
          type: string
          default: focus

    UserDataResponse:
      type: object
      properties:
        data:
          type: object
          description: Arbitrary JSON blob for the requested data type
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    UserDataSaveBody:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: Arbitrary JSON blob to store
          additionalProperties: true

    CalendarEvent:
      type: object
      properties:
        uid:
          type: string
        summary:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        allDay:
          type: boolean

    MailItem:
      type: object
      properties:
        uid:
          type: integer
        subject:
          type: string
        from:
          type: string
        date:
          type: string
          format: date-time
        seen:
          type: boolean
        tag:
          type: string
          nullable: true
        folder:
          type: string

    MailDetail:
      allOf:
        - $ref: '#/components/schemas/MailItem'
        - type: object
          properties:
            body:
              type: string
            html:
              type: string
              nullable: true
            to:
              type: string
            cc:
              type: string
              nullable: true
            attachments:
              type: array
              items:
                type: object
                properties:
                  filename:
                    type: string
                  size:
                    type: integer

    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
          nullable: true
        action:
          type: string
        detail:
          type: string
          nullable: true
        ip:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AppSettings:
      type: object
      description: Key-value map of application-wide settings
      additionalProperties:
        type: string

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns server status, security configuration flags, and database connectivity.
      operationId: getHealth
      responses:
        '200':
          description: Server health information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  security:
                    type: object
                    properties:
                      jwtSecret:
                        type: boolean
                      encryptionKey:
                        type: boolean
                  database:
                    type: boolean

  /api/setup/status:
    get:
      tags: [Setup]
      summary: Setup status
      description: Returns whether initial setup is still needed and whether user registration is enabled.
      operationId: getSetupStatus
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  needsSetup:
                    type: boolean
                    description: True when no admin account exists yet
                  registrationEnabled:
                    type: boolean
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/setup/complete:
    post:
      tags: [Setup]
      summary: Complete initial setup
      description: Creates the first admin account. Only available when no admin exists. Rate limited to 20 requests per 15 minutes.
      operationId: completeSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        '201':
          description: Admin account created and JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account. Requires registration to be enabled. Rate limited to 20 requests per 15 minutes.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - password
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        '201':
          description: Account created and JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Registration is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticates with email and password. Rate limited to 20 requests per 15 minutes.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Account is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/profile:
    put:
      tags: [Auth]
      summary: Update user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error or incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/account:
    delete:
      tags: [Auth]
      summary: Delete own account
      operationId: deleteAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  description: Current password to confirm deletion
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid password or last admin guard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks:
    get:
      tags: [Tasks]
      summary: List all tasks
      description: Returns all tasks for the authenticated user including subtasks and metadata fields.
      operationId: listTasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Tasks]
      summary: Create a task
      operationId: createTask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateBody'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
