<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="system-ui, -apple-system, sans-serif" role="img" aria-labelledby="quickadd-title">
  <title id="quickadd-title">Dopamind Aufgabe anlegen – Felder: Titel, Wichtigkeit (Muss sein/Wichtig/Wäre schön), Wann, Energie-Level. Hinweis auf automatische Einplanung.</title>
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <clipPath id="roundedWin">
      <rect width="900" height="500" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <rect width="900" height="500" rx="12" ry="12" fill="url(#bgGrad)"/>
  <rect width="900" height="500" rx="12" ry="12" fill="none" stroke="rgba(108,99,255,0.25)" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="44" fill="rgba(22,33,62,0.95)" clip-path="url(#roundedWin)"/>
  <rect x="0" y="43" width="900" height="1" fill="rgba(108,99,255,0.2)"/>
  <circle cx="20" cy="22" r="6" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="38" cy="22" r="6" fill="#FFB84C" opacity="0.8"/>
  <circle cx="56" cy="22" r="6" fill="#00C9A7" opacity="0.8"/>
  <text x="450" y="27" text-anchor="middle" fill="url(#accentGrad)" font-size="15" font-weight="700">Dopamind · Neue Aufgabe</text>

  <!-- Modal card -->
  <rect x="120" y="56" width="660" height="432" rx="12" fill="rgba(22,33,62,0.98)" stroke="rgba(108,99,255,0.3)" stroke-width="1.5"/>

  <!-- Modal header -->
  <text x="150" y="90" fill="#F0EFF9" font-size="16" font-weight="700">Neue Aufgabe erstellen</text>
  <line x1="150" y1="98" x2="750" y2="98" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>

  <!-- ── SECTION: Was ── -->
  <text x="150" y="122" fill="#8B83FF" font-size="11" font-weight="700" letter-spacing="0.08em">WAS MÖCHTEST DU ERLEDIGEN?</text>
  <rect x="150" y="130" width="590" height="40" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <text x="168" y="155" fill="#F0EFF9" font-size="14">Präsentation für Quarterly Review</text>
  <!-- cursor blink -->
  <rect x="370" y="140" width="1.5" height="18" fill="#6C63FF" opacity="0.8"/>

  <!-- ── SECTION: Wichtigkeit ── -->
  <text x="150" y="192" fill="#8B83FF" font-size="11" font-weight="700" letter-spacing="0.08em">WICHTIGKEIT</text>
  <!-- Priority chips -->
  <rect x="150" y="200" width="115" height="34" rx="8" fill="rgba(255,107,107,0.2)" stroke="#FF6B6B" stroke-width="2"/>
  <text x="207" y="222" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="600">🔴 Muss sein</text>

  <rect x="276" y="200" width="100" height="34" rx="8" fill="rgba(255,184,76,0.1)" stroke="rgba(255,184,76,0.3)" stroke-width="1"/>
  <text x="326" y="222" text-anchor="middle" fill="#FFB84C" font-size="13" font-weight="500">🟡 Wichtig</text>

  <rect x="387" y="200" width="110" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="442" y="222" text-anchor="middle" fill="#9CA3AF" font-size="13" font-weight="500">🟢 Wäre schön</text>

  <!-- ── SECTION: Wann ── -->
  <text x="150" y="260" fill="#8B83FF" font-size="11" font-weight="700" letter-spacing="0.08em">WANN?</text>
  <!-- When chips -->
  <rect x="150" y="268" width="78" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="189" y="290" text-anchor="middle" fill="#9CA3AF" font-size="12">Heute</text>

  <rect x="240" y="268" width="86" height="34" rx="8" fill="rgba(108,99,255,0.2)" stroke="#6C63FF" stroke-width="2"/>
  <text x="283" y="290" text-anchor="middle" fill="#8B83FF" font-size="12" font-weight="600">Morgen</text>

  <rect x="338" y="268" width="92" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="384" y="290" text-anchor="middle" fill="#9CA3AF" font-size="12">Diese Woche</text>

  <rect x="442" y="268" width="60" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="472" y="290" text-anchor="middle" fill="#9CA3AF" font-size="12">Datum</text>

  <!-- ── SECTION: Energie ── -->
  <text x="150" y="328" fill="#8B83FF" font-size="11" font-weight="700" letter-spacing="0.08em">ENERGIE-BEDARF</text>
  <rect x="150" y="336" width="88" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="194" y="358" text-anchor="middle" fill="#9CA3AF" font-size="12">⚡ Niedrig</text>

  <rect x="250" y="336" width="100" height="34" rx="8" fill="rgba(255,184,76,0.15)" stroke="rgba(255,184,76,0.4)" stroke-width="2"/>
  <text x="300" y="358" text-anchor="middle" fill="#FFB84C" font-size="12" font-weight="600">⚡⚡ Mittel</text>

  <rect x="362" y="336" width="100" height="34" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.15)" stroke-width="1"/>
  <text x="412" y="358" text-anchor="middle" fill="#9CA3AF" font-size="12">⚡⚡⚡ Hoch</text>

  <!-- ADHD context note -->
  <rect x="150" y="382" width="590" height="44" rx="8" fill="rgba(0,201,167,0.06)" stroke="rgba(0,201,167,0.2)" stroke-width="1"/>
  <text x="170" y="400" fill="#00C9A7" font-size="11">💡</text>
  <text x="187" y="400" fill="#9CA3AF" font-size="11">Dopamind plant diese Aufgabe automatisch in ein passendes</text>
  <text x="187" y="416" fill="#9CA3AF" font-size="11">Zeitfenster — abgestimmt auf Energie-Level und Kalender-Termine.</text>

  <!-- Action buttons -->
  <rect x="150" y="440" width="590" height="36" rx="0" fill="none"/>
  <!-- Cancel -->
  <rect x="150" y="440" width="90" height="36" rx="8" fill="none" stroke="rgba(108,99,255,0.25)" stroke-width="1"/>
  <text x="195" y="463" text-anchor="middle" fill="#6B7280" font-size="13">Abbrechen</text>
  <!-- Save -->
  <rect x="618" y="440" width="122" height="36" rx="8" fill="#6C63FF"/>
  <text x="679" y="463" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Aufgabe anlegen</text>
</svg>
