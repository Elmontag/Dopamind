          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== STATS =====================
  /api/stats:
    get:
      tags: [Stats]
      summary: Get user statistics
      operationId: getStats
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      tags: [Stats]
      summary: Update user statistics
      operationId: updateStats
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                xp:
                  type: number
                  minimum: 0
                level:
                  type: number
                  minimum: 0
                currentStreakDays:
                  type: number
                  minimum: 0
                longestStreak:
                  type: number
                  minimum: 0
                completedToday:
                  type: number
                  minimum: 0
                completedThisWeek:
                  type: number
                  minimum: 0
                completedThisMonth:
                  type: number
                  minimum: 0
                completedThisYear:
                  type: number
                  minimum: 0
                lastCompletedDate:
                  type: string
                  format: date
                  nullable: true
                updatedAt:
                  type: string
                  format: date-time
                  description: For optimistic locking; if provided, update only succeeds when server value matches
      responses:
        "200":
          description: Updated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "400":
          description: Validation error or no fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Optimistic locking conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== ACHIEVEMENTS =====================
  /api/achievements:
    get:
      tags: [Achievements]
      summary: List unlocked achievements
      operationId: listAchievements
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Array of achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Achievements]
      summary: Unlock an achievement
      operationId: unlockAchievement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "201":
          description: Achievement unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Achievement"
        "400":
          description: Missing or invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== FOCUS BLOCKS =====================
  /api/focus-blocks:
    get:
      tags: [FocusBlocks]
      summary: List focus blocks
      operationId: listFocusBlocks
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by date (YYYY-MM-DD). If omitted, returns latest 100.
      responses:
        "200":
          description: Array of focus blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FocusBlock"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [FocusBlocks]
      summary: Log a focus block
      operationId: createFocusBlock
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, durationMinutes]
              properties:
                date:
                  type: string
                  format: date
                startTime:
                  type: string
                  nullable: true
                  description: "HH:MM format"
                durationMinutes:
                  type: number
                  minimum: 1
                type:
                  type: string
                  default: focus
      responses:
        "201":
          description: Focus block created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusBlock"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== USER DATA =====================
  /api/user-data/{type}:
    get:
      tags: [UserData]
      summary: Get user data blob by type
      operationId: getUserData
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [settings, app_state, time_tracking, resource_monitor]
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserData"
        "400":
          description: Invalid data type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [UserData]
      summary: Save user data blob by type
      operationId: saveUserData
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [settings, app_state, time_tracking, resource_monitor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  description: >
                    Arbitrary JSON object. For "settings" type, sensitive fields
                    (imap/smtp/caldav passwords) are encrypted at rest.
      responses:
        "200":
          description: Data saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid data type or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
