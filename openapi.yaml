openapi: 3.0.3
info:
  title: Dopamind API
  version: "1.0.0"
  description: >
    Dopamind is a productivity application with task management, calendar (CalDAV),
    mail (IMAP/SMTP), focus tracking, achievements, statistics, and user administration.

servers:
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Health
    description: Server health check
  - name: Setup
    description: Initial admin setup (public)
  - name: Auth
    description: Authentication and account management
  - name: Admin
    description: Admin user and settings management (requires admin role)
  - name: Tasks
    description: Task and subtask CRUD
  - name: Categories
    description: Category management
  - name: Calendar
    description: Calendar events (CalDAV or local fallback)
  - name: Mail
    description: Email via IMAP/SMTP
  - name: Stats
    description: User statistics and gamification
  - name: Achievements
    description: Achievement tracking
  - name: FocusBlocks
    description: Focus session logging
  - name: UserData
    description: Arbitrary user data blobs (settings, app state, etc.)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XMailConfig:
      name: X-Mail-Config
      in: header
      required: true
      description: >
        Base64-encoded JSON object with IMAP/SMTP connection details.
        Decoded shape: { host, port, user, password, tls, smtp: { host, port, user, password } }
      schema:
        type: string
    XCalDAVConfig:
      name: X-CalDAV-Config
      in: header
      required: false
      description: >
        Base64-encoded JSON object with CalDAV connection details.
        Decoded shape: { url, user, password, calendarUrl }
      schema:
        type: string

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    # --- Auth / User ---

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    # --- Admin ---

    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        emailVerified:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        lastLogin:
          type: string
          format: date-time
          nullable: true

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        detail:
          type: string
        ip:
          type: string
        created_at:
          type: string
          format: date-time
        user_email:
          type: string
          nullable: true

    AdminSettings:
      type: object
      properties:
        registrationEnabled:
          type: boolean

    # --- Tasks ---

    Task:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        completed:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        scheduledTime:
          type: string
          nullable: true
        estimatedMinutes:
          type: number
        energyCost:
          type: string
          enum: [low, medium, high]
        sortOrder:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        subtasks:
          type: array
          items:
            $ref: "#/components/schemas/Subtask"
        # Metadata fields (optional, spread into response)
        timeOfDay:
          type: string
          nullable: true
        scheduledDate:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        mailRef:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        sizeCategory:
          type: string
          nullable: true
        blockSortIndex:
          type: number
          nullable: true

    Subtask:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: string
        text:
          type: string
        completed:
          type: boolean
        estimatedMinutes:
          type: number
        sortOrder:
          type: number

    # --- Categories ---

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          default: area
        color:
          type: string
          default: gray
        sortOrder:
          type: number

    # --- Calendar ---

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        date:
          type: string
          format: date
        start:
          type: string
          nullable: true
          description: "HH:MM format"
        end:
          type: string
          nullable: true
          description: "HH:MM format"
        allDay:
          type: boolean

    CalDAVCalendar:
      type: object
      properties:
        url:
          type: string
        name:
          type: string
        ctag:
          type: string
          nullable: true

    # --- Mail ---

    MailSummary:
      type: object
      properties:
        uid:
          type: integer
        subject:
          type: string
        from:
          type: string
        fromName:
          type: string
        date:
          type: string
          format: date-time
          nullable: true
        seen:
          type: boolean
        flagged:
          type: boolean
        preview:
          type: string
        tags:
          type: array
          items:
            type: string

    MailMessage:
      type: object
      properties:
        uid:
          type: integer
        subject:
          type: string
        from:
          type: string
        to:
          type: string
        cc:
          type: string
        date:
          type: string
          format: date-time
          nullable: true
        body:
          type: string
        html:
          type: string

    # --- Stats ---

    Stats:
      type: object
      properties:
        xp:
          type: number
        level:
          type: number
        currentStreakDays:
          type: number
        longestStreak:
          type: number
        completedToday:
          type: number
        completedThisWeek:
          type: number
        completedThisMonth:
          type: number
        completedThisYear:
          type: number
        lastCompletedDate:
          type: string
          format: date
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    # --- Achievements ---

    Achievement:
      type: object
      properties:
        id:
          type: string
        unlockedAt:
          type: string
          format: date-time

    # --- Focus Blocks ---

    FocusBlock:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        startTime:
          type: string
          nullable: true
        durationMinutes:
          type: number
        type:
          type: string
          default: focus
        createdAt:
          type: string
          format: date-time

    # --- User Data ---

    UserData:
      type: object
      properties:
        data:
          type: object
        updatedAt:
          type: string
          format: date-time
          nullable: true

    # --- Health ---

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database:
          type: boolean
        security:
          type: object
          properties:
            jwtSecret:
              type: boolean
            encryptionKey:
              type: boolean

    # --- Setup ---

    SetupStatus:
      type: object
      properties:
        needsSetup:
          type: boolean
        registrationEnabled:
          type: boolean

paths:
  # ===================== HEALTH =====================
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ===================== SETUP =====================
  /api/setup/status:
    get:
      tags: [Setup]
      summary: Check if initial setup is needed
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/setup/complete:
    post:
      tags: [Setup]
      summary: Create the initial admin account
      operationId: completeSetup
      description: Only works when no admin user exists yet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== AUTH =====================
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Registration is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/profile:
    put:
      tags: [Auth]
      summary: Update user profile
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase, and a digit
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Current password incorrect or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/account:
    delete:
      tags: [Auth]
      summary: Delete own account
      operationId: deleteAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid password or cannot delete last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== ADMIN =====================
  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users (paginated)
      operationId: adminListUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
          description: Search by email or name (case-insensitive)
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Admin]
      summary: Create a new user
      operationId: adminCreateUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  maxLength: 100
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get a specific user
      operationId: adminGetUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Admin]
      summary: Update a user
      operationId: adminUpdateUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [user, admin]
                active:
                  type: boolean
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Validation error or cannot remove last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Admin]
      summary: Delete a user
      operationId: adminDeleteUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Cannot delete own account or last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/audit-log:
    get:
      tags: [Admin]
      summary: View audit log (paginated)
      operationId: adminGetAuditLog
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/settings:
    get:
      tags: [Admin]
      summary: Get admin settings
      operationId: adminGetSettings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags: [Admin]
      summary: Update admin settings
      operationId: adminUpdateSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [registrationEnabled]
              properties:
                registrationEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===================== TASKS =====================
  /api/tasks:
    get:
      tags: [Tasks]
      summary: List all tasks with subtasks
      operationId: listTasks
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "500":
