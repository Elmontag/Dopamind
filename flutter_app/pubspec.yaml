name: dopamind
description: Offline-first task planning app with gamification, energy-aware scheduling, IMAP mail integration, and native calendar support.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Native Device Calendar
  device_calendar: ^4.3.0

  # IMAP Mail
  enough_mail: ^2.7.0

  # Secure Storage (IMAP credentials)
  flutter_secure_storage: ^9.2.2

  # Local Notifications (deadlines, focus timer)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Backup / Restore
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  path_provider: ^2.1.3

  # Drag & Drop reordering
  reorderables: ^0.6.0

  # UUID generation
  uuid: ^4.4.0

  # JSON serialisation helper
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  # Fonts are loaded via google_fonts at runtime
